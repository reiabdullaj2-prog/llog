<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <title>Statistikat - Menaxhimi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="p-4">

    <h1>Statistikat për vitin: {{ viti }}</h1>

    <div class="my-4">
        <a href="?viti=2025" class="btn btn-outline-primary">2025</a>
        <a href="?viti=2026" class="btn btn-outline-primary">2026</a>
        <a href="?viti=2027" class="btn btn-outline-primary">2027</a>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 mb-3 border-success">
                <h5>Fitimet</h5>
                <p class="fs-4 text-success">{{ fitimet_totale }} L</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 mb-3 border-danger">
                <h5>Shpenzimet</h5>
                <p class="fs-4 text-danger">{{ shpenzimet_totale }} L</p>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card p-3 mb-3 border-primary">
                <h5>Gjendja</h5>
                <p class="fs-4 text-primary">{{ gjendja }} L</p>
            </div>
        </div>
    </div>

    <div style="width: 300px; height: 300px; margin-top: 20px;">
        <canvas id="myPieChart"></canvas>
    </div>

    <div style="text-align: right; margin-top: 30px;">
        <a href="{% url 'shtepia' %}" style="padding: 10px 20px; background-color: #6c757d; color: white; text-decoration: none; border-radius: 5px; font-weight: bold;">
            Kryesore
        </a>
    </div>

    <script>
        const ctx = document.getElementById('myPieChart').getContext('2d');
        new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Fitimet', 'Shpenzimet'],
                datasets: [{
                    data: [{{ fitimet_totale|default:0 }}, {{ shpenzimet_totale|default:0 }}],
                    backgroundColor: ['#28a745', '#dc3545']
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: { position: 'top' }
                }
            }
        });
    </script>

</body>
</html>

        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Të Ardhurat', 'Shpenzimet'],
                datasets: [{
                    data: [{{ fitimet_totale }}, {{ shpenzimet_totale }}],
                    backgroundColor: ['#28a745', '#dc3545'],
                    borderWidth: 2
                }]
            }
        });
    </script>
</body>
</html>
